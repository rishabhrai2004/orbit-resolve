/* GitHub Actions CI/CD Pipeline */
name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: orbit
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: orbit_resolve
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Run migrations
      env:
        DATABASE_URL: postgresql://orbit:testpass@localhost:5432/orbit_resolve
      run: npm run migrate

    - name: Run tests
      env:
        DATABASE_URL: postgresql://orbit:testpass@localhost:5432/orbit_resolve
      run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t orbit-resolve:${{ github.sha }} .

    - name: Push to registry
      run: |
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        docker tag orbit-resolve:${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/orbit-resolve:latest
        docker push ${{ secrets.DOCKER_REGISTRY }}/orbit-resolve:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Deploy to production
      run: |
        # Deploy to Kubernetes or cloud platform
        kubectl set image deployment/orbit-resolve-api \
          api=${{ secrets.DOCKER_REGISTRY }}/orbit-resolve:latest \
          -n orbit-resolve
