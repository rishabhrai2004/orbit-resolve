/* Kubernetes Deployment Manifest */
apiVersion: v1
kind: Namespace
metadata:
  name: orbit-resolve

---
apiVersion: v1
kind: Secret
metadata:
  name: orbit-secrets
  namespace: orbit-resolve
type: Opaque
stringData:
  database-url: postgresql://user:password@postgres:5432/orbit_resolve
  jwt-secret: your-super-secret-jwt-key
  stripe-secret: sk_live_...

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: orbit-config
  namespace: orbit-resolve
data:
  NODE_ENV: production
  LOG_LEVEL: info

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbit-resolve-api
  namespace: orbit-resolve
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orbit-resolve-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: orbit-resolve-api
    spec:
      containers:
      - name: api
        image: registry.example.com/orbit-resolve:v3.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: orbit-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: orbit-secrets
              key: jwt-secret
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: orbit-config
              key: NODE_ENV
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: orbit-resolve-api
  namespace: orbit-resolve
spec:
  type: ClusterIP
  selector:
    app: orbit-resolve-api
  ports:
  - port: 3000
    targetPort: 3000
    name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: orbit-resolve-hpa
  namespace: orbit-resolve
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: orbit-resolve-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
