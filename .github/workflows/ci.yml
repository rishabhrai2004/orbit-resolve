name: CI

on:
  push:
    branches: [ main, 'fix/**', 'ci/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run test-runner
        run: node test-runner.mjs

      - name: Run Jest (if configured)
        run: npm test --silent || true
