name: CI

on:
  push:
    branches: [ main, 'fix/**', 'ci/**' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        ports:
          - 5433:5432
        env:
          POSTGRES_DB: orbit_resolve_ci
          POSTGRES_USER: orbit
          POSTGRES_PASSWORD: localdev
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5433 && break || sleep 1
          done

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=postgresql://orbit:localdev@localhost:5433/orbit_resolve_ci" >> $GITHUB_ENV

      - name: Run migrations
        run: npm run migrate

      - name: Seed database
        run: npm run seed

      - name: Run test-runner
        run: node test-runner.mjs

      - name: Run Jest (integration)
        run: npm test --silent
