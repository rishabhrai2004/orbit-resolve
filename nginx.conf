/* Production NGINX Configuration */
upstream orbit_api {
  server localhost:3000;
  server localhost:3001;
  server localhost:3002;
  keepalive 64;
}

server {
  listen 80;
  server_name app.orbitresolve.com;
  return 301 https://$server_name$request_uri;
}

server {
  listen 443 ssl http2;
  server_name app.orbitresolve.com;

  # SSL Configuration
  ssl_certificate /etc/letsencrypt/live/app.orbitresolve.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.orbitresolve.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security Headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Logging
  access_log /var/log/nginx/orbit_access.log;
  error_log /var/log/nginx/orbit_error.log;

  # Static Assets (Frontend)
  location / {
    root /var/www/orbit-resolve/public;
    try_files $uri $uri/ /index.html;
    expires 1d;
    add_header Cache-Control "public, immutable";
  }

  # API Proxy
  location /api/ {
    proxy_pass http://orbit_api;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 4k;
  }

  # Health Check
  location /health {
    proxy_pass http://orbit_api;
    access_log off;
  }

  # Metrics (internal only)
  location /metrics {
    allow 10.0.0.0/8;
    deny all;
    proxy_pass http://orbit_api;
  }
}
