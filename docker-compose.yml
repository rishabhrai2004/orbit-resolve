version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: orbit-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-orbit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
      POSTGRES_DB: orbit_resolve
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbit"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: orbit-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-orbit}:${DB_PASSWORD:-localdev}@postgres:5432/orbit_resolve
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
