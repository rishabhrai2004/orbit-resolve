<!-- Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit Resolve — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-container { background: white; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 48px; width: 100%; max-width: 400px; }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 32px; }
    .logo-icon { width: 24px; height: 24px; color: #4f46e5; }
    .logo-text { font-weight: 600; font-size: 18px; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e4e4e7; border-radius: 6px; font-size: 14px; font-family: 'Inter', sans-serif; }
    input:focus { outline: none; border-color: #4f46e5; }
    .btn-login { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 24px; font-size: 14px; }
    .btn-login:hover { background: #4338ca; }
    .error { color: #dc2626; font-size: 14px; margin-top: 12px; }
    .demo-creds { background: #f0fdf4; border: 1px solid #86efac; border-radius: 6px; padding: 12px; font-size: 13px; margin-top: 24px; }
    .demo-creds strong { color: #16a34a; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
      </svg>
      <span class="logo-text">Orbit Resolve</span>
    </div>

    <h1>Sign In</h1>
    <p class="subtitle">Autonomous Operational Execution</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" value="admin@acme.com" placeholder="user@company.com" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" value="password123" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn-login">Sign In</button>
      <div id="error" class="error"></div>
    </form>

    <div class="demo-creds">
      <strong>Demo Credentials:</strong><br/>
      Email: admin@acme.com<br/>
      Password: password123
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
